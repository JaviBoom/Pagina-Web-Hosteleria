<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MerigonSweets - Administracion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="admin-page">
        <header class="admin-header">
            <h1>Panel de Administrador</h1>
            <a class="back-link" href="index.html">Volver a la tienda</a>
        </header>

        <section id="loginSection" class="admin-box" aria-labelledby="login-title">
            <h2 id="login-title">Iniciar sesion</h2>
            <p class="hint">Accede con Google. Solo el correo autorizado puede entrar al modo desarrollador.</p>
            <div id="googleSignInButton"></div>
            <p id="loginWarning" class="hint warning" hidden></p>
        </section>

        <section id="adminPanel" class="admin-box" aria-labelledby="manage-title" hidden>
            <div class="panel-head">
                <div>
                    <h2 id="manage-title">Gestion de productos</h2>
                    <p id="sessionBadge" class="session-badge"></p>
                </div>
                <button id="logoutBtn" type="button" class="btn secondary">Cerrar sesion</button>
            </div>

            <div id="developerTools" class="developer-tools" hidden>
                <p class="hint">Modo desarrollador activo para: <strong id="developerEmail"></strong></p>
                <button id="resetCatalogBtn" type="button" class="btn secondary">Restablecer catalogo por defecto</button>
            </div>

            <div class="panel-grid">
                <form id="productForm" class="admin-form">
                    <h3>Anadir producto</h3>
                    <label>
                        Nombre
                        <input id="productName" class="input" type="text" required>
                    </label>
                    <label>
                        Descripcion
                        <input id="productDesc" class="input" type="text" required>
                    </label>
                    <label>
                        Precio
                        <input id="productPrice" class="input" type="text" required placeholder="Ej: EUR 4.50 / unidad">
                    </label>
                    <label>
                        Categoria
                        <input id="productCategory" class="input" type="text" required>
                    </label>
                    <label>
                        Imagen (ruta o URL)
                        <input id="productImage" class="input" type="text" required placeholder="Ej: assets/img/tarrina-pistacho.jpg">
                    </label>
                    <button type="submit" class="btn">Guardar producto</button>
                </form>

                <div class="list-block">
                    <h3>Quitar producto</h3>
                    <ul id="productList" class="product-list" aria-live="polite"></ul>
                </div>
            </div>
        </section>
    </div>

        <script src="assets/js/admin.js" defer></script>
</body>
</html>
